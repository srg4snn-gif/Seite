<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>За миллион лет до — Давид Писарчук</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            overflow-x: hidden;
            background-color: #0a0a0a;
        }

        /* Hero Section */
        .hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                        url('img/cover.jpg') center / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease-out;
            pointer-events: none;
        }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #ffffff;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            line-height: 1.3;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            font-style: italic;
        }

        .hero-author {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.7);
            margin-bottom: 4rem;
            color: #e8e8e8;
        }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 3rem;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            padding-bottom: 0.3rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .nav-link:hover {
            border-bottom-color: #ffffff;
            transform: translateY(-2px);
        }

        .nav-link::after {
            content: '→';
            margin-left: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-link:hover::after {
            opacity: 1;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
        }

        /* Content section */
        .content-section {
            position: relative;
            z-index: 2;
            margin-top: 100vh;
            padding: 4rem 2rem;
            background-color: #0a0a0a;
            color: #ffffff;
            text-align: center;
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-text {
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 1.8;
            letter-spacing: 0.03em;
            color: #d0d0d0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.2rem;
            }

            .hero-author {
                font-size: 1.3rem;
            }

            .nav-menu {
                gap: 1.5rem;
                flex-direction: column;
                align-items: center;
            }

            .nav-link {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.8rem;
            }

            .hero-author {
                font-size: 1rem;
            }

            .nav-link {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-overlay" id="heroOverlay"></div>
        
        <div class="hero-content">
            <h1 class="hero-title">За миллион лет до</h1>
            <p class="hero-author">Давид Писарчук</p>
            
            <nav class="nav-menu">
                <a href="/kniga/" class="nav-link">Читать книгу</a>
                <a href="/odoevsky/" class="nav-link">Одоевский</a>
                <a href="/blog-odoevskogo/" class="nav-link">Блог Одоевского</a>
            </nav>
        </div>

        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5v10m0 4v2" stroke-linecap="round"/>
                <path d="M7 12l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </section>

    <section class="content-section">
        <div class="content-text">
            <p>Добро пожаловать на официальный сайт романа<br><strong>«За миллион лет до»</strong></p>
        </div>
    </section>

    <script>
        // Smooth scroll effect with overlay color transition
        const heroOverlay = document.getElementById('heroOverlay');
        
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / window.innerHeight;
            const overlayOpacity = Math.min(scrollPercent * 0.6, 0.8);
            
            heroOverlay.style.backgroundColor = `rgba(0, 0, 0, ${0.2 + overlayOpacity})`;
        });

        // Smooth scroll for navigation links
        document.querySelectorAll('a[href^="/"]').forEach(link => {
            link.addEventListener('click', (e) => {
                // Allow default navigation
                return true;
            });
        });
    </script>
</body>
</html>
