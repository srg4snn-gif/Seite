<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="stylesheet" href="css/styles.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>За миллион лет до — Давид Писарчук</title>
</head>
<body>
    <header class="top-nav">
        <button class="nav-toggle" aria-expanded="false" aria-label="Меню">
            <span></span>
        </button>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="kniga/index.html">Читать книгу</a></li>
                <li><a href="odoevsky/index.html">Одоевский</a></li>
                <li><a href="blog-odoevskogo/index.html">Блог Одоевского</a></li>
                <li><a href="kontakt.html">Контакты</a></li>
                <li><a href="impressum.html">Impressum</a></li>
                <li><a href="datenschutz.html">Datenschutz</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-overlay" id="heroOverlay"></div>
        
        <div class="hero-content">
            <h1 class="hero-title">За миллион лет до</h1>
            <p class="hero-author">Давид Писарчук</p>
        </div>

        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5v10m0 4v2" stroke-linecap="round"/>
                <path d="M7 12l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </section>

    <section class="content-section">
        <div class="content-text">
            <p>Добро пожаловать на официальный сайт романа<br><strong>«За миллион лет до»</strong></p>
        </div>
    </section>

    <script>
        // Smooth scroll effect with overlay color transition
        const heroOverlay = document.getElementById('heroOverlay');
        
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / window.innerHeight;
            const overlayOpacity = Math.min(scrollPercent * 0.6, 0.8);
            
            heroOverlay.style.backgroundColor = `rgba(0, 0, 0, ${0.2 + overlayOpacity})`;
        });

        // Smooth scroll for navigation links
        document.querySelectorAll('a[href^="/"]').forEach(link => {
            link.addEventListener('click', (e) => {
                // Allow default navigation
                return true;
            });
        });

        const navToggle = document.querySelector('.nav-toggle');
        const topNav = document.querySelector('.top-nav');

        if (navToggle && topNav) {
            navToggle.addEventListener('click', () => {
                const expanded = navToggle.getAttribute('aria-expanded') === 'true';
                navToggle.setAttribute('aria-expanded', String(!expanded));
                topNav.classList.toggle('menu-open');
            });
        }
    </script>
</body>
</html>
